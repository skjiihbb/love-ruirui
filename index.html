<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="">
<meta property="og:title" content="❤️🐶">
<meta property="og:description" content="">
<meta property="og:type" content="website">
<title>❤️🐶</title>
<style>
@font-face {
  font-family: 'ZCOOL QingKe HuangYou';
  src: url('https://cdn.jsdelivr.net/npm/@openfonts/zcool-qingke-huangyou_chinese-simplified/files/zcool-qingke-huangyou-chinese-simplified-400.woff2') format('woff2');
  font-display: swap;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'ZCOOL QingKe HuangYou', 'YouYuan', 'STYuanti', sans-serif;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

/* ========== 背景 ========== */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #FFD1DC 0%, #FFE4E1 25%, #FFDAB9 55%, #FFD1DC 100%);
}
.bg-dots {
  position: fixed; inset: 0; z-index: 1;
  background-image: radial-gradient(circle, rgba(255,255,255,0.55) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}
.bg-glow {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 70vmin; height: 70vmin;
  background: radial-gradient(ellipse, rgba(255,255,255,0.5) 0%, rgba(255,218,185,0.25) 40%, transparent 70%);
  border-radius: 50%;
  z-index: 2;
  pointer-events: none;
  animation: glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
}

/* ========== 标题 ========== */
.title {
  position: fixed; top: 3.5vh; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-size: clamp(18px, 5vw, 28px);
  color: #d4787c;
  letter-spacing: 0.12em;
  text-shadow: 0 2px 8px rgba(212,120,124,0.3);
  animation: titleBreathe 2.5s ease-in-out infinite;
}
@keyframes titleBreathe {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; }
}

/* ========== 爱心容器 ========== */
.heart-wrapper {
  position: fixed; z-index: 10;
  pointer-events: none;
  animation: heartBreathe 3.5s ease-in-out infinite;
}
@keyframes heartBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.035); }
}

.heart-text-wrap {
  position: absolute;
  pointer-events: auto;
}
.heart-text {
  display: inline-block;
  white-space: nowrap;
  color: #c9606a;
  font-size: clamp(13px, 3.2vw, 18px);
  background: rgba(255,255,255,0.9);
  border: 2px solid #f0a0a8;
  border-radius: 20px;
  padding: 5px 13px;
  box-shadow: 0 2px 10px rgba(200,100,120,0.15);
  opacity: 0;
  transform: scale(0);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: auto;
}
.heart-text.visible {
  opacity: 1;
  transform: scale(1);
}
.heart-text:nth-child(2n) { color: #d4787c; border-color: #e8a0a8; }
.heart-text:nth-child(3n) { color: #e08882; border-color: #d8a0b0; }

.heart-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: clamp(24px, 6vw, 40px);
  pointer-events: none;
  animation: centerPulse 2s ease-in-out infinite;
}
@keyframes centerPulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
}

/* ========== Hello Kitty 图片 ========== */
.kitty-container {
  position: fixed; z-index: 8; pointer-events: none;
}
.kitty-img {
  display: block;
  width: 75px;
  height: 75px;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.95))
          drop-shadow(0 0 14px rgba(255,182,193,0.4))
          drop-shadow(0 3px 10px rgba(200,150,160,0.35));
  border-radius: 22%;
}
.music-btn .kitty-img {
  width: 70px;
  height: 70px;
}

.kitty-pos4 { top: 7vh; left: 4vw; transform: rotate(-5deg) scale(0.7); }

/* ========== 音乐按钮 ========== */
.music-btn {
  position: fixed; bottom: 4vh; right: 4vw;
  z-index: 100;
  cursor: pointer;
  pointer-events: auto;
  animation: musicFloat 2s ease-in-out infinite;
  transition: transform 0.2s;
}
.music-btn:active { transform: scale(0.9); }
.music-btn.playing .kitty-img { filter: drop-shadow(0 0 8px rgba(255,255,255,0.95)) drop-shadow(0 0 18px rgba(255,105,138,0.6)) drop-shadow(0 3px 10px rgba(200,150,160,0.35)); }

.music-label {
  position: absolute; bottom: -18px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: #d4787c; white-space: nowrap; opacity: 0.85;
}

.note-ripple {
  position: absolute; top: 50%; left: 50%;
  width: 0; height: 0;
  background: rgba(255,182,193,0.4);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: rippleOut 1.2s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleOut {
  0% { width: 0; height: 0; opacity: 0.7; }
  100% { width: 100px; height: 100px; opacity: 0; }
}

@keyframes musicFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ========== 闪烁星星 ========== */
.twinkle {
  position: fixed; z-index: 5; pointer-events: none;
  font-size: clamp(12px, 3vw, 22px);
}
.twinkle-1 { top: 11vh; left: 18vw; animation: twinkleAnim 2.5s ease-in-out infinite 0s; }
.twinkle-2 { top: 15vh; right: 22vw; animation: twinkleAnim 3s ease-in-out infinite 0.8s; }
.twinkle-3 { top: 44vh; left: 7vw; animation: twinkleAnim 2.8s ease-in-out infinite 1.2s; }
.twinkle-4 { top: 50vh; right: 9vw; animation: twinkleAnim 3.2s ease-in-out infinite 0.4s; }
.twinkle-5 { top: 72vh; left: 20vw; animation: twinkleAnim 2.6s ease-in-out infinite 1.6s; }
.twinkle-6 { top: 75vh; right: 24vw; animation: twinkleAnim 2.9s ease-in-out infinite 0.9s; }
.twinkle-7 { top: 28vh; left: 5vw; animation: twinkleAnim 3.5s ease-in-out infinite 2s; }
.twinkle-8 { top: 33vh; right: 7vw; animation: twinkleAnim 2.7s ease-in-out infinite 1.4s; }
.twinkle-9 { top: 62vh; left: 30vw; animation: twinkleAnim 3.1s ease-in-out infinite 0.3s; }
.twinkle-10 { top: 20vh; left: 50vw; animation: twinkleAnim 2.4s ease-in-out infinite 1.8s; }
.twinkle-11 { top: 65vh; right: 33vw; animation: twinkleAnim 3.3s ease-in-out infinite 0.6s; }
.twinkle-12 { top: 84vh; left: 38vw; animation: twinkleAnim 2.2s ease-in-out infinite 1.1s; }

@keyframes twinkleAnim {
  0%, 100% { opacity: 0.25; transform: scale(0.8); }
  50% { opacity: 0.9; transform: scale(1.3); }
}

/* ========== 点击特效 ========== */
.click-fx {
  position: fixed;
  pointer-events: none;
  z-index: 50;
  font-size: 20px;
  animation: clickBurst 1s ease-out forwards;
}
@keyframes clickBurst {
  0% { opacity: 1; transform: translate(0, 0) scale(0.5) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.3) rotate(var(--rot)); }
}

/* ========== Canvas 下落 ========== */
#fallCanvas {
  position: fixed; inset: 0; z-index: 6; pointer-events: none;
}
</style>
</head>

<script>
(function() {
  var btn = document.getElementById('musicBtn');
  var audio = document.getElementById('bgmAudio');
  var label = document.getElementById('musicLabel');
  var playing = false;

  audio.src = 'bgm.mp3';

  function playMusic() {
    audio.play().then(function() {
      playing = true;
      btn.classList.add('playing');
      label.textContent = '♪ 播放中';
      // 开始逐个显示爱心文字
      if (window.startHeartReveal) window.startHeartReveal();
      var ripple = document.createElement('div');
      ripple.className = 'note-ripple';
      btn.appendChild(ripple);
      setTimeout(function() { ripple.remove(); }, 1300);
    }).catch(function(e) {});
  }

  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (playing) {
      audio.pause();
      playing = false;
      btn.classList.remove('playing');
      label.textContent = '点我播放 ♪';
    } else {
      playMusic();
    }
  });

  var autoPlayed = false;
  function autoPlay() {
    if (!autoPlayed) { autoPlayed = true; playMusic(); }
  }
  document.addEventListener('touchstart', autoPlay, { once: true });
  document.addEventListener('click', function(e) {
    if (!autoPlayed && e.target !== btn && !btn.contains(e.target)) { autoPlay(); }
  }, { once: true });

  // 音乐循环时重新开始文字动画
  var lastTime = 0;
  audio.addEventListener('timeupdate', function() {
    if (playing && audio.currentTime < lastTime && window.startHeartReveal) {
      window.startHeartReveal();
    }
    lastTime = audio.currentTime;
  });
})();

// 爱心文字
(function() {
  var texts = [
    '乖乖吃饭', '天天开心', '好好睡觉', '注意防晒',
    '别太累了', '记得想我', '要照顾好自己', '每天都要笑',
    '多喝水水', '你最可爱', '摸摸头', '抱抱你',
    '爱你哟', '你最好看了', '永远幸福', '你是小太阳',
    '今天超棒', '开开心心'
  ];
  var wrapper = document.getElementById('heartWrapper');
  var allWraps = [];

  function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
  function heartY(t) {
    return -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  }

  function placeTexts() {
    wrapper.querySelectorAll('.heart-text-wrap').forEach(function(el) { el.remove(); });
    allWraps = [];
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var scale = Math.min(vw, vh) * 0.021;
    var cx = vw / 2;
    var cy = vh * 0.45;

    wrapper.style.width = vw + 'px';
    wrapper.style.height = vh + 'px';

    for (var i = 0; i < texts.length; i++) {
      var t = (i / texts.length) * Math.PI * 2;
      if (t < 0.3) t = 0.3 + (0.3-t)*0.5;
      if (t > Math.PI*2 - 0.3) t = Math.PI*2 - 0.3 - (t-(Math.PI*2-0.3))*0.5;

      var x = heartX(t) * scale;
      var y = heartY(t) * scale;
      var dt = 0.001;
      var dx = (heartX(t+dt) - heartX(t-dt)) * scale;
      var dy = (heartY(t+dt) - heartY(t-dt)) * scale;
      var angle = Math.atan2(dy, dx) * 180 / Math.PI;
      if (y > scale * 5 && Math.abs(angle) > 90) angle += 180;

      var wrap = document.createElement('span');
      wrap.className = 'heart-text-wrap';
      wrap.style.cssText = 'left:'+(cx+x)+'px;top:'+(cy+y)+'px;transform:translate(-50%,-50%) rotate('+angle+'deg)';

      var span = document.createElement('span');
      span.className = 'heart-text';
      span.textContent = texts[i];

      wrap.appendChild(span);
      wrapper.appendChild(wrap);
      allWraps.push(wrap);
    }
  }

  // 逐个显示文字
  var currentIdx = 0;
  var revealTimer = null;

  window.revealNextText = function() {
    if (currentIdx < allWraps.length) {
      var wrap = allWraps[currentIdx];
      var span = wrap.querySelector('.heart-text');
      if (span) span.classList.add('visible');
      currentIdx++;
    }
  };

  window.resetHeartTexts = function() {
    if (revealTimer) clearInterval(revealTimer);
    currentIdx = 0;
    allWraps.forEach(function(wrap) {
      var span = wrap.querySelector('.heart-text');
      if (span) span.classList.remove('visible');
    });
  };

  window.startHeartReveal = function() {
    resetHeartTexts();
    revealNextText();
    revealTimer = setInterval(function() {
      if (currentIdx >= allWraps.length) {
        clearInterval(revealTimer);
        revealTimer = null;
        return;
      }
      revealNextText();
    }, 2800);
  };

  window.isHeartRevealing = function() {
    return revealTimer !== null && currentIdx < allWraps.length;
  };

  placeTexts();
  var resizeTimer;
  window.addEventListener('resize', function() { clearTimeout(resizeTimer); resizeTimer = setTimeout(placeTexts, 200); });
  setTimeout(placeTexts, 500);
  setTimeout(placeTexts, 1500);
})();

// 下落特效
(function() {
  var canvas = document.getElementById('fallCanvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var emojis = ['✨','⭐','🌟','💖','💕','💗','💝','🌸','♡','✧'];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  function create(startY) {
    return {
      x: Math.random() * canvas.width,
      y: startY != null ? startY : -20 - Math.random() * canvas.height * 0.3,
      speed: 0.4 + Math.random() * 0.9,
      wobble: (Math.random() - 0.5) * 0.6,
      phase: Math.random() * Math.PI * 2,
      size: 10 + Math.random() * 16,
      text: emojis[Math.floor(Math.random() * emojis.length)],
      opacity: 0.3 + Math.random() * 0.55,
      rot: Math.random() * 360,
      rotSpd: (Math.random() - 0.5) * 1.5
    };
  }

  for (var i = 0; i < 35; i++) particles.push(create(Math.random() * canvas.height));

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.y += p.speed;
      p.phase += 0.01;
      p.x += Math.sin(p.phase) * p.wobble;
      p.rot += p.rotSpd;
      if (p.y > canvas.height + 30) { particles[i] = create(); continue; }
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.font = p.size + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.text, 0, 0);
      ctx.restore();
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// 点击冒出特效
document.addEventListener('click', function(e) {
  var emojis = ['💖','💕','✨','🌟','💗','🌸','💝','⭐','♡','🎀'];
  for (var i = 0; i < 8; i++) {
    var el = document.createElement('div');
    el.className = 'click-fx';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = e.clientX + 'px';
    el.style.top = e.clientY + 'px';
    el.style.fontSize = (14 + Math.random() * 18) + 'px';
    el.style.setProperty('--dx', (Math.random() - 0.5) * 120 + 'px');
    el.style.setProperty('--dy', -(40 + Math.random() * 100) + 'px');
    el.style.setProperty('--rot', (Math.random() - 0.5) * 180 + 'deg');
    el.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', function() { el.remove(); });
  }
});
</script>
